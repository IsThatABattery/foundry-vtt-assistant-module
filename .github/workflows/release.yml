name: Release Foundry Module

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm run release:manifest
      - run: npm run package
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            module.json
            module.zip
          generate_release_notes: true
